<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix Admin Password - Striving Eagle</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 700px;
        }
        .fix-btn {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 10px;
            cursor: pointer;
            margin: 15px;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .fix-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(220, 53, 69, 0.3);
        }
        h1 { 
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        .status {
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        .info { background: #d1ecf1; color: #0c5460; }
        .debug {
            background: #e9ecef;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 14px;
            text-align: left;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Fix Admin Password Issue</h1>
        
        <div id="status" class="status info">
            Analyzing password issue...
        </div>
        
        <button onclick="fixPasswordHashing()" class="fix-btn">
            🔐 FIX PASSWORD HASHING
        </button>
        
        <button onclick="testCorrectLogin()" class="fix-btn" style="background: #28a745;">
            🔐 TEST CORRECT LOGIN
        </button>
        
        <div id="debug" class="debug">
            Loading debug info...
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        async function fixPasswordHashing() {
            console.log('🔐 Fixing password hashing issue...');
            
            try {
                // Create AuthSystem instance
                const auth = new AuthSystem();
                
                // Hash the password correctly
                const hashedPassword = await auth.hashPassword('ChisomoXCharles08');
                console.log('🔑 Hashed password:', hashedPassword);
                
                // Create admin account with hashed password
                const adminUser = {
                    id: 'admin_001',
                    name: 'Admin User',
                    email: 'Charles',
                    password: hashedPassword, // Use properly hashed password
                    role: 'admin',
                    createdAt: new Date().toISOString()
                };
                
                // Clear and save
                localStorage.clear();
                localStorage.setItem('users', JSON.stringify([adminUser]));
                
                console.log('✅ Admin account created with hashed password');
                
                showStatus('✅ Password hashing fixed! Admin account created with proper password hash.', 'success');
                updateDebug();
                
            } catch (error) {
                console.error('❌ Error fixing password:', error);
                showStatus('❌ Error: ' + error.message, 'error');
            }
        }
        
        async function testCorrectLogin() {
            console.log('🔐 Testing correct login...');
            
            try {
                const auth = new AuthSystem();
                const result = await auth.login('Charles', 'ChisomoXCharles08');
                
                console.log('🔐 Login result:', result);
                
                if (result.success) {
                    showStatus('✅ Login successful! Admin access working correctly.', 'success');
                    console.log('✅ Current user:', auth.currentUser);
                } else {
                    showStatus('❌ Login failed: ' + result.error, 'error');
                }
                
                updateDebug();
                
            } catch (error) {
                console.error('❌ Error testing login:', error);
                showStatus('❌ Error: ' + error.message, 'error');
            }
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = message;
        }
        
        function updateDebug() {
            const debugDiv = document.getElementById('debug');
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const session = localStorage.getItem('userSession');
            
            let debugInfo = '🔍 DEBUG INFO:\n\n';
            debugInfo += `Users in localStorage: ${users.length}\n`;
            
            if (users.length > 0) {
                const admin = users.find(u => u.role === 'admin');
                if (admin) {
                    debugInfo += `Admin username: ${admin.email}\n`;
                    debugInfo += `Admin password type: ${typeof admin.password}\n`;
                    debugInfo += `Admin password length: ${admin.password.length}\n`;
                    debugInfo += `Password starts with: ${admin.password.substring(0, 20)}...\n`;
                    debugInfo += `Is hashed: ${admin.password.length > 20 ? 'Yes' : 'No'}\n`;
                }
            }
            
            debugInfo += `\nSession exists: ${session ? 'Yes' : 'No'}\n`;
            
            if (session) {
                const sessionData = JSON.parse(session);
                debugInfo += `Session user: ${sessionData.user?.email || 'None'}\n`;
                debugInfo += `Session role: ${sessionData.user?.role || 'None'}\n`;
            }
            
            debugDiv.textContent = debugInfo;
        }
        
        // Auto-check on page load
        document.addEventListener('DOMContentLoaded', function() {
            updateDebug();
        });
    </script>
</body>
</html>
