<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Admin Solution - Striving Eagle</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 700px;
        }
        .solution-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 10px;
            cursor: pointer;
            margin: 15px;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .solution-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(40, 167, 69, 0.3);
        }
        .danger-btn {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }
        .danger-btn:hover {
            box-shadow: 0 10px 20px rgba(220, 53, 69, 0.3);
        }
        h1 { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        .status {
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        .info { background: #d1ecf1; color: #0c5460; }
        .credentials {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin: 20px 0;
            border: 3px solid #28a745;
        }
        .step {
            background: #e8f5e8;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 5px solid #28a745;
            text-align: left;
        }
        .step-number {
            background: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 50%;
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Complete Admin Solution</h1>
        
        <div class="credentials">
            <h3>🔑 Final Working Credentials:</h3>
            <p><strong>Username:</strong> Charles</p>
            <p><strong>Password:</strong> ChisomoXCharles08</p>
            <p><strong>Role:</strong> admin</p>
        </div>
        
        <div class="step">
            <span class="step-number">1</span>
            <strong>Complete Reset:</strong> Clear all data and create fresh admin
        </div>
        
        <button onclick="completeReset()" class="solution-btn">
            🔄 COMPLETE RESET - Fresh Start
        </button>
        
        <div class="step">
            <span class="step-number">2</span>
            <strong>Test Login:</strong> Verify admin login works
        </div>
        
        <button onclick="testAdminLogin()" class="solution-btn">
            🔐 TEST ADMIN LOGIN
        </button>
        
        <div class="step">
            <span class="step-number">3</span>
            <strong>Go to Admin:</strong> Access admin dashboard
        </div>
        
        <button onclick="goToAdmin()" class="solution-btn">
            🏠 GO TO ADMIN DASHBOARD
        </button>
        
        <div class="step">
            <span class="step-number">4</span>
            <strong>Emergency:</strong> If nothing else works
        </div>
        
        <button onclick="emergencyFix()" class="solution-btn danger-btn">
            🚨 EMERGENCY FIX
        </button>
        
        <div id="result" style="margin-top: 30px;"></div>
    </div>

    <script>
        function completeReset() {
            console.log('🔄 Starting complete reset...');
            
            // Clear everything
            localStorage.clear();
            
            // Create proper admin account
            const adminUser = {
                id: 'admin_001',
                name: 'Admin User',
                email: 'Charles',
                password: 'ChisomoXCharles08',
                role: 'admin',
                createdAt: new Date().toISOString()
            };
            
            // Save admin account
            localStorage.setItem('users', JSON.stringify([adminUser]));
            
            showResult('✅ Complete reset done! Admin account created with username "Charles"', 'success');
        }
        
        function testAdminLogin() {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const adminUser = users.find(u => u.email === 'Charles' && u.role === 'admin');
            
            if (adminUser) {
                showResult('✅ Admin account found! Username: Charles, Password: ChisomoXCharles08', 'success');
            } else {
                showResult('❌ Admin account not found. Try Complete Reset first.', 'error');
            }
        }
        
        function goToAdmin() {
            // Check if admin exists first
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const adminUser = users.find(u => u.email === 'Charles' && u.role === 'admin');
            
            if (adminUser) {
                window.location.href = 'admin/dashboard.html';
            } else {
                showResult('❌ Admin account not found. Try Complete Reset first.', 'error');
            }
        }
        
        function emergencyFix() {
            if (confirm('🚨 EMERGENCY FIX: This will reset everything and create a working admin login. Continue?')) {
                // Nuclear option - clear everything and create working admin
                localStorage.clear();
                
                const emergencyAdmin = {
                    id: 'admin_emergency',
                    name: 'Emergency Admin',
                    email: 'Charles',
                    password: 'ChisomoXCharles08',
                    role: 'admin',
                    createdAt: new Date().toISOString()
                };
                
                localStorage.setItem('users', JSON.stringify([emergencyAdmin]));
                
                // Create session
                const session = {
                    user: emergencyAdmin,
                    loginTime: new Date().toISOString()
                };
                localStorage.setItem('userSession', JSON.stringify(session));
                
                showResult('🚨 EMERGENCY FIX COMPLETE! Admin login is now working.', 'success');
                
                setTimeout(() => {
                    window.location.href = 'admin/dashboard.html';
                }, 2000);
            }
        }
        
        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = `
                <div class="status ${type}">
                    ${message}
                </div>
                <div style="margin-top: 20px;">
                    <button onclick="goToLogin()" class="solution-btn" style="background: #007bff; font-size: 14px;">
                        🚪 Go to Login Page
                    </button>
                </div>
            `;
        }
        
        function goToLogin() {
            window.location.href = 'login.html';
        }
        
        // Auto-check on page load
        document.addEventListener('DOMContentLoaded', function() {
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const adminUser = users.find(u => u.email === 'Charles' && u.role === 'admin');
            
            if (adminUser) {
                showResult('✅ Admin account "Charles" is ready to use!', 'success');
            } else {
                showResult('⚠️ Admin account not found. Use Complete Reset to create it.', 'warning');
            }
        });
    </script>
</body>
</html>
