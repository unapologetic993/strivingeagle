<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Fix - Striving Eagle</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #28a745;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            padding: 15px;
            margin: 15px 0;
            border-radius: 5px;
            font-weight: bold;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        h1 { color: #2c3e50; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Fixing Admin Account...</h1>
        <div class="spinner"></div>
        <div id="status" class="status warning">Removing duplicate customer accounts...</div>
        <div id="details"></div>
    </div>

    <script>
        // Fix admin account immediately on page load
        document.addEventListener('DOMContentLoaded', function() {
            const statusDiv = document.getElementById('status');
            const detailsDiv = document.getElementById('details');
            
            setTimeout(() => {
                try {
                    // Get users from localStorage
                    const users = JSON.parse(localStorage.getItem('users') || '[]');
                    const adminEmail = 'charlesluhanga77@gmail.com';
                    
                    console.log('🔍 Checking for duplicate accounts...');
                    console.log('Total users:', users.length);
                    
                    const duplicateAccounts = users.filter(u => u.email === adminEmail);
                    console.log('Accounts with admin email:', duplicateAccounts.length);
                    
                    let details = '<h3>📊 Account Analysis:</h3>';
                    duplicateAccounts.forEach(user => {
                        console.log('- Found:', user.email, 'Role:', user.role, 'ID:', user.id);
                        details += `<div style="margin: 5px 0; padding: 10px; background: #f8f9fa; border-radius: 5px;">
                            📧 ${user.email}<br>
                            🎭 Role: ${user.role}<br>
                            🆔 ID: ${user.id}
                        </div>`;
                    });
                    
                    // Remove customer accounts with admin email, keep only admin account
                    const filteredUsers = users.filter(user => {
                        if (user.email === adminEmail) {
                            return user.role === 'admin'; // Keep only admin account
                        }
                        return true; // Keep all other users
                    });
                    
                    console.log('After filtering:');
                    console.log('Total users:', filteredUsers.length);
                    
                    const remainingAdminAccounts = filteredUsers.filter(u => u.email === adminEmail && u.role === 'admin');
                    console.log('Admin accounts remaining:', remainingAdminAccounts.length);
                    
                    // Save back to localStorage
                    localStorage.setItem('users', JSON.stringify(filteredUsers));
                    
                    // Clear session
                    localStorage.removeItem('userSession');
                    
                    // Show success
                    statusDiv.className = 'status success';
                    statusDiv.innerHTML = '✅ Admin account fixed successfully!';
                    
                    details += `
                        <div class="status success" style="margin-top: 20px;">
                            <strong>🎯 Fix Complete!</strong><br>
                            📊 Removed ${users.length - filteredUsers.length} duplicate accounts<br>
                            👤 Admin account preserved<br>
                            🔐 Session cleared<br>
                            🚀 Ready to login as admin
                        </div>
                        <div style="margin-top: 20px;">
                            <a href="login.html" style="background: #28a745; color: white; padding: 15px 30px; text-decoration: none; border-radius: 5px; display: inline-block;">
                                🔐 Go to Login Page
                            </a>
                        </div>
                    `;
                    
                    detailsDiv.innerHTML = details;
                    
                } catch (error) {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '❌ Error fixing admin account';
                    detailsDiv.innerHTML = `<div class="status error">${error.message}</div>`;
                }
            }, 2000);
        });
    </script>
</body>
</html>
