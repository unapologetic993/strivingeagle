<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix Admin Login - Striving Eagle</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
        }
        .fix-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 25px 50px;
            border-radius: 8px;
            cursor: pointer;
            margin: 20px;
            font-size: 22px;
            font-weight: bold;
        }
        .fix-btn:hover {
            background: #218838;
            transform: scale(1.05);
        }
        h1 { color: #28a745; margin-bottom: 30px; }
        .status {
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        .credentials {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border: 2px solid #28a745;
        }
        .debug {
            background: #e9ecef;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 14px;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Fix Admin Login Issue</h1>
        
        <div class="credentials">
            <h3>🔑 Final Admin Credentials:</h3>
            <p><strong>Username:</strong> Charles</p>
            <p><strong>Password:</strong> ChisomoXCharles08</p>
            <p><strong>Role:</strong> admin</p>
        </div>
        
        <button onclick="fixAdminLogin()" class="fix-btn">
            🔧 FIX ADMIN LOGIN COMPLETELY
        </button>
        
        <div id="result" style="margin-top: 30px;"></div>
        
        <div id="debug" class="debug">
            <strong>🔍 Debug Info:</strong><br>
            Loading...
        </div>
    </div>

    <script>
        function fixAdminLogin() {
            console.log('🔧 Starting complete admin fix...');
            
            // Clear everything
            localStorage.clear();
            console.log('🗑️ Cleared all localStorage');
            
            // Create proper admin account with correct password
            const adminUser = {
                id: 'admin_001',
                name: 'Admin User',
                email: 'Charles',
                password: 'ChisomoXCharles08', // Plain text password for testing
                role: 'admin',
                createdAt: new Date().toISOString()
            };
            
            // Save admin account
            localStorage.setItem('users', JSON.stringify([adminUser]));
            console.log('✅ Created admin account:', adminUser);
            
            // Create session manually
            const session = {
                user: adminUser,
                loginTime: new Date().toISOString()
            };
            localStorage.setItem('userSession', JSON.stringify(session));
            console.log('✅ Created session:', session);
            
            showResult('Admin login fixed! Try logging in now.', 'success');
            updateDebug();
        }
        
        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = `
                <div class="status ${type}">
                    ${type === 'success' ? '✅' : '❌'} ${message}
                </div>
                <div style="margin-top: 20px;">
                    <button onclick="testLogin()" class="fix-btn" style="background: #007bff; font-size: 16px;">
                        🔐 Test Login Now
                    </button>
                    <button onclick="goToLogin()" class="fix-btn" style="background: #ffc107; color: #000; font-size: 16px;">
                        🚪 Go to Login Page
                    </button>
                </div>
            `;
        }
        
        function testLogin() {
            // Load auth system and test
            const script = document.createElement('script');
            script.src = 'js/auth.js';
            script.onload = async function() {
                try {
                    const auth = new AuthSystem();
                    await auth.initialize();
                    
                    const result = await auth.login('Charles', 'ChisomoXCharles08');
                    console.log('🔐 Test login result:', result);
                    
                    if (result.success) {
                        alert('✅ Login test successful! Admin login is working.');
                    } else {
                        alert('❌ Login test failed: ' + result.error);
                    }
                } catch (error) {
                    alert('❌ Error testing login: ' + error.message);
                }
            };
            document.head.appendChild(script);
        }
        
        function goToLogin() {
            window.location.href = 'login.html';
        }
        
        function updateDebug() {
            const debugDiv = document.getElementById('debug');
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const session = localStorage.getItem('userSession');
            
            debugDiv.innerHTML = `
                <strong>🔍 Debug Info:</strong><br>
                Users in localStorage: ${users.length}<br>
                Admin username: ${users.length > 0 ? users[0].email : 'None'}<br>
                Admin password: ${users.length > 0 ? (users[0].password === 'ChisomoXCharles08' ? 'Correct' : 'Wrong') : 'None'}<br>
                Session exists: ${session ? 'Yes' : 'No'}<br>
                Session user: ${session ? JSON.parse(session).user.email : 'None'}
            `;
        }
        
        // Auto-check on page load
        document.addEventListener('DOMContentLoaded', function() {
            updateDebug();
        });
    </script>
</body>
</html>
