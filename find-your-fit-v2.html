<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Fit - Outfit Matching</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            margin-bottom: 30px;
        }
        .search-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            height: fit-content;
        }
        .results-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .form-textarea {
            height: 100px;
            resize: vertical;
        }
        .outfit-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .outfit-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #e9ecef;
        }
        .outfit-item h4 {
            margin: 0 0 10px 0;
            color: #495057;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
            margin: 10px 5px;
        }
        .btn:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        .btn-success {
            background: #28a745;
        }
        .btn-success:hover {
            background: #218838;
        }
        .btn-secondary {
            background: #6c757d;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .result-card {
            background: #f8f9fa;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .result-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .result-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }
        .result-content {
            padding: 20px;
        }
        .result-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        .result-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .result-price {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
        }
        .result-match {
            background: #28a745;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.8em;
        }
        .result-description {
            color: #666;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .result-actions {
            display: flex;
            gap: 10px;
        }
        .result-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .view-btn {
            background: #667eea;
            color: white;
        }
        .view-btn:hover {
            background: #5a6fd8;
        }
        .add-btn {
            background: #28a745;
            color: white;
        }
        .add-btn:hover {
            background: #218838;
        }
        .no-results {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .no-results i {
            font-size: 3em;
            margin-bottom: 20px;
            color: #ddd;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .filter-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .filter-tag {
            background: #e9ecef;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-tag:hover {
            background: #dee2e6;
        }
        .filter-tag.active {
            background: #667eea;
            color: white;
        }
        .outfit-preview {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .outfit-preview h3 {
            margin: 0 0 15px 0;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Find Your Fit</h1>
            <p>Post your complete outfit and we'll find the nearest matching results</p>
        </div>
        
        <div class="main-content">
            <div class="search-section">
                <h2>👔 Create Your Outfit</h2>
                <form id="outfit-form">
                    <div class="form-group">
                        <label class="form-label">Outfit Name</label>
                        <input type="text" id="outfit-name" class="form-input" placeholder="Summer Casual Look">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Gender</label>
                        <select id="outfit-gender" class="form-select">
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="unisex">Unisex</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Age Group</label>
                        <select id="outfit-age" class="form-select">
                            <option value="">Select Age Group</option>
                            <option value="all-ages">All Ages</option>
                            <option value="kids">Kids</option>
                            <option value="teens">Teens</option>
                            <option value="adults">Adults</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Occasion</label>
                        <select id="outfit-occasion" class="form-select">
                            <option value="">Select Occasion</option>
                            <option value="casual">Casual</option>
                            <option value="formal">Formal</option>
                            <option value="sports">Sports</option>
                            <option value="party">Party</option>
                            <option value="business">Business</option>
                            <option value="date">Date Night</option>
                            <option value="vacation">Vacation</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Style</label>
                        <select id="outfit-style" class="form-select">
                            <option value="">Select Style</option>
                            <option value="modern">Modern</option>
                            <option value="classic">Classic</option>
                            <option value="street">Street</option>
                            <option value="vintage">Vintage</option>
                            <option value="minimalist">Minimalist</option>
                            <option value="bohemian">Bohemian</option>
                            <option value="sporty">Sporty</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Budget Range (MWK)</label>
                        <input type="text" id="outfit-budget" class="form-input" placeholder="5,000 - 25,000">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Outfit Items</label>
                        <div class="outfit-items">
                            <div class="outfit-item">
                                <h4>Top</h4>
                                <input type="text" class="form-input" id="outfit-top" placeholder="T-shirt, Shirt, Blouse">
                            </div>
                            <div class="outfit-item">
                                <h4>Bottom</h4>
                                <input type="text" class="form-input" id="outfit-bottom" placeholder="Jeans, Skirt, Shorts">
                            </div>
                            <div class="outfit-item">
                                <h4>Shoes</h4>
                                <input type="text" class="form-input" id="outfit-shoes" placeholder="Sneakers, Heels, Boots">
                            </div>
                            <div class="outfit-item">
                                <h4>Accessories</h4>
                                <input type="text" class="form-input" id="outfit-accessories" placeholder="Watch, Belt, Hat, Sunglasses">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea id="outfit-description" class="form-textarea" placeholder="Describe your ideal outfit..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-search"></i> Find Matching Outfits
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="fillSampleOutfit()">
                            <i class="fas fa-magic"></i> Sample Outfit
                        </button>
                        <button type="button" class="btn btn-secondary" onclick="clearForm()">
                            <i class="fas fa-times"></i> Clear
                        </button>
                    </div>
                </form>
            </div>
            
            <div class="results-section">
                <h2>🎯 Matching Results</h2>
                <div id="results-container">
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <h3>No Results Yet</h3>
                        <p>Create an outfit and click "Find Matching Outfits" to see results</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allProducts = [];
        let matchingResults = [];
        
        document.getElementById('outfit-form').addEventListener('submit', function(e) {
            e.preventDefault();
            findMatchingOutfits();
        });
        
        function loadProducts() {
            // Load products from admin storage
            allProducts = JSON.parse(localStorage.getItem('adminProducts') || '[]');
            console.log('Loaded products:', allProducts.length);
        }
        
        function findMatchingOutfits() {
            const outfit = {
                name: document.getElementById('outfit-name').value,
                gender: document.getElementById('outfit-gender').value,
                age: document.getElementById('outfit-age').value,
                occasion: document.getElementById('outfit-occasion').value,
                style: document.getElementById('outfit-style').value,
                budget: document.getElementById('outfit-budget').value,
                top: document.getElementById('outfit-top').value,
                bottom: document.getElementById('outfit-bottom').value,
                shoes: document.getElementById('outfit-shoes').value,
                accessories: document.getElementById('outfit-accessories').value,
                description: document.getElementById('outfit-description').value
            };
            
            if (!outfit.gender || !outfit.age) {
                alert('Please select gender and age group');
                return;
            }
            
            showLoading();
            
            // Simulate matching process
            setTimeout(() => {
                performMatching(outfit);
            }, 1500);
        }
        
        function performMatching(outfit) {
            console.log('Performing matching for:', outfit);
            
            // Score products based on outfit criteria
            const scoredProducts = allProducts.map(product => {
                let score = 0;
                let matchReasons = [];
                
                // Gender matching (highest priority)
                if (product.gender === outfit.gender || product.gender === 'unisex') {
                    score += 30;
                    matchReasons.push('Gender match');
                }
                
                // Age group matching
                if (product.ageGroup === outfit.age || product.ageGroup === 'all-ages') {
                    score += 20;
                    matchReasons.push('Age group match');
                }
                
                // Category matching based on outfit items
                const outfitItems = [outfit.top, outfit.bottom, outfit.shoes, outfit.accessories].join(' ').toLowerCase();
                const productCategory = product.category.toLowerCase();
                
                if (outfitItems.includes('shirt') || outfitItems.includes('top') || outfitItems.includes('t-shirt')) {
                    if (productCategory.includes('shirt') || productCategory.includes('top')) {
                        score += 15;
                        matchReasons.push('Top match');
                    }
                }
                
                if (outfitItems.includes('jeans') || outfitItems.includes('pants') || outfitItems.includes('bottom')) {
                    if (productCategory.includes('jeans') || productCategory.includes('pants')) {
                        score += 15;
                        matchReasons.push('Bottom match');
                    }
                }
                
                if (outfitItems.includes('shoes') || outfitItems.includes('sneakers') || outfitItems.includes('boots')) {
                    if (productCategory.includes('shoes') || productCategory.includes('sneakers')) {
                        score += 15;
                        matchReasons.push('Shoes match');
                    }
                }
                
                if (outfitItems.includes('accessories') || outfitItems.includes('watch') || outfitItems.includes('hat')) {
                    if (productCategory.includes('accessories') || productCategory.includes('glasses') || productCategory.includes('hats')) {
                        score += 15;
                        matchReasons.push('Accessories match');
                    }
                }
                
                // Occasion matching
                if (outfit.occasion) {
                    if (outfit.occasion === 'formal' && (productCategory.includes('jeans') || productCategory.includes('accessories'))) {
                        score += 10;
                        matchReasons.push('Formal occasion');
                    }
                    if (outfit.occasion === 'casual' && productCategory.includes('accessories')) {
                        score += 10;
                        matchReasons.push('Casual occasion');
                    }
                    if (outfit.occasion === 'sports' && productCategory.includes('accessories')) {
                        score += 10;
                        matchReasons.push('Sports occasion');
                    }
                }
                
                // Style matching
                if (outfit.style) {
                    score += 5;
                    matchReasons.push('Style preference');
                }
                
                // Budget matching
                if (outfit.budget && product.price) {
                    const budgetRange = outfit.budget.split('-').map(b => parseInt(b.replace(/,/g, '')));
                    if (budgetRange.length === 2) {
                        if (product.price >= budgetRange[0] && product.price <= budgetRange[1]) {
                            score += 10;
                            matchReasons.push('Budget match');
                        }
                    }
                }
                
                return {
                    ...product,
                    matchScore: score,
                    matchReasons: matchReasons,
                    matchPercentage: Math.min(100, Math.round((score / 100) * 100))
                };
            });
            
            // Sort by match score
            matchingResults = scoredProducts.filter(p => p.matchScore > 0).sort((a, b) => b.matchScore - a.matchScore);
            
            console.log('Matching results:', matchingResults);
            displayResults(matchingResults, outfit);
        }
        
        function displayResults(results, outfit) {
            const container = document.getElementById('results-container');
            
            if (results.length === 0) {
                container.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <h3>No Matching Results</h3>
                        <p>Try adjusting your outfit criteria or browse our full collection</p>
                    </div>
                `;
                return;
            }
            
            // Create outfit preview
            const outfitPreview = `
                <div class="outfit-preview">
                    <h3>🎯 Your Outfit: ${outfit.name}</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px;">
                        ${outfit.top ? `<div><strong>Top:</strong> ${outfit.top}</div>` : ''}
                        ${outfit.bottom ? `<div><strong>Bottom:</strong> ${outfit.bottom}</div>` : ''}
                        ${outfit.shoes ? `<div><strong>Shoes:</strong> ${outfit.shoes}</div>` : ''}
                        ${outfit.accessories ? `<div><strong>Accessories:</strong> ${outfit.accessories}</div>` : ''}
                    </div>
                </div>
            `;
            
            const resultsHTML = results.map((product, index) => `
                <div class="result-card">
                    <img src="${product.image || 'https://via.placeholder.com/300x250?text=Product+Image'}" 
                         alt="${product.name}" 
                         class="result-image"
                         onerror="this.src='https://via.placeholder.com/300x250?text=Error'">
                    <div class="result-content">
                        <div class="result-title">${product.name}</div>
                        <div class="result-meta">
                            <span class="result-price">MWK ${product.price.toLocaleString()}</span>
                            <span class="result-match">${product.matchPercentage}% Match</span>
                        </div>
                        <div class="result-description">${product.description}</div>
                        <div style="margin-bottom: 10px;">
                            <small><strong>Match reasons:</strong> ${product.matchReasons.join(', ')}</small>
                        </div>
                        <div class="result-actions">
                            <button class="result-btn view-btn" onclick="viewProduct('${product.id}')">
                                <i class="fas fa-eye"></i> View Details
                            </button>
                            <button class="result-btn add-btn" onclick="addToOutfit('${product.id}', '${outfit.name}')">
                                <i class="fas fa-plus"></i> Add to Outfit
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            container.innerHTML = outfitPreview + `
                <div class="filter-tags">
                    <div class="filter-tag ${!outfit.occasion ? 'active' : ''}" onclick="filterByOccasion('')">All</div>
                    <div class="filter-tag ${outfit.occasion === 'casual' ? 'active' : ''}" onclick="filterByOccasion('casual')">Casual</div>
                    <div class="filter-tag ${outfit.occasion === 'formal' ? 'active' : ''}" onclick="filterByOccasion('formal')">Formal</div>
                    <div class="filter-tag ${outfit.occasion === 'sports' ? 'active' : ''}" onclick="filterByOccasion('sports')">Sports</div>
                </div>
                <div class="results-grid">
                    ${resultsHTML}
                </div>
            `;
        }
        
        function showLoading() {
            const container = document.getElementById('results-container');
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <h3>Finding Your Perfect Match...</h3>
                    <p>Analyzing your outfit preferences</p>
                </div>
            `;
        }
        
        function viewProduct(productId) {
            window.location.href = `product.html?id=${productId}`;
        }
        
        function addToOutfit(productId, outfitName) {
            const product = allProducts.find(p => p.id === productId);
            if (!product) return;
            
            // Save to outfit collection
            let outfits = JSON.parse(localStorage.getItem('userOutfits') || '[]');
            const outfitItem = {
                id: 'outfit_' + Date.now(),
                name: outfitName,
                products: [product],
                createdAt: new Date().toISOString()
            };
            
            outfits.push(outfitItem);
            localStorage.setItem('userOutfits', JSON.stringify(outfits));
            
            alert(`✅ "${product.name}" added to your "${outfitName}" outfit!`);
        }
        
        function filterByOccasion(occasion) {
            // Update active tag
            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Filter results
            const filtered = occasion ? 
                matchingResults.filter(p => p.category.toLowerCase().includes(occasion)) : 
                matchingResults;
            
            displayResults(filtered, {
                name: document.getElementById('outfit-name').value,
                occasion: occasion
            });
        }
        
        function fillSampleOutfit() {
            document.getElementById('outfit-name').value = 'Summer Street Style';
            document.getElementById('outfit-gender').value = 'male';
            document.getElementById('outfit-age').value = 'adults';
            document.getElementById('outfit-occasion').value = 'casual';
            document.getElementById('outfit-style').value = 'street';
            document.getElementById('outfit-budget').value = '10,000 - 25,000';
            document.getElementById('outfit-top').value = 'Graphic T-shirt';
            document.getElementById('outfit-bottom').value = 'Distressed Jeans';
            document.getElementById('outfit-shoes').value = 'White Sneakers';
            document.getElementById('outfit-accessories').value = 'Baseball Cap, Watch';
            document.getElementById('outfit-description').value = 'Cool and comfortable summer outfit for casual outings with friends';
        }
        
        function clearForm() {
            document.getElementById('outfit-form').reset();
            document.getElementById('results-container').innerHTML = `
                <div class="no-results">
                    <i class="fas fa-search"></i>
                    <h3>No Results Yet</h3>
                    <p>Create an outfit and click "Find Matching Outfits" to see results</p>
                </div>
            `;
        }
        
        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
        });
    </script>
</body>
</html>
