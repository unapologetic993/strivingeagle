<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Admin Login - Striving Eagle</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
        }
        .test-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 8px;
            cursor: pointer;
            margin: 15px;
            font-size: 18px;
            font-weight: bold;
        }
        .test-btn:hover {
            background: #0056b3;
            transform: scale(1.05);
        }
        h1 { color: #007bff; margin-bottom: 30px; }
        .status {
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        .credentials {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border: 2px solid #007bff;
        }
        .form-group {
            margin: 15px 0;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Test Admin Login</h1>
        
        <div class="form-group">
            <label for="username">Username:</label>
            <input type="text" id="username" placeholder="Enter admin username">
        </div>
        
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" placeholder="Enter admin password">
        </div>
        
        <button onclick="testLogin()" class="test-btn">
            🔐 TEST LOGIN
        </button>
        
        <button onclick="createAdmin()" class="test-btn" style="background: #28a745;">
            👤 CREATE ADMIN ACCOUNT
        </button>
        
        <div id="result" style="margin-top: 30px;"></div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        function initAuth() {
            try {
                if (typeof AuthSystem !== 'undefined') {
                    window.auth = new AuthSystem();
                    console.log('✅ AuthSystem initialized');
                    return true;
                } else {
                    console.error('❌ AuthSystem not found');
                    return false;
                }
            } catch (error) {
                console.error('❌ Error initializing auth:', error);
                return false;
            }
        }
        
        async function createAdmin() {
            console.log('Creating admin user...');
            
            // Create admin user
            const adminUser = {
                id: 'admin_001',
                name: 'Admin User',
                email: 'admin',
                password: 'hashed_password_placeholder',
                role: 'admin',
                createdAt: new Date().toISOString()
            };
            
            const users = [adminUser];
            localStorage.setItem('users', JSON.stringify(users));
            
            alert('✅ Admin user created!');
        }
        
        async function testLogin() {
            if (!auth) {
                if (!initAuth()) {
                    showResult('❌ Failed to initialize auth system', 'error');
                    return;
                }
            }
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            console.log('🔐 Testing login...');
            console.log('Username:', username);
            console.log('Password:', password);
            
            try {
                const result = await auth.login(username, password);
                console.log('Login result:', result);
                
                if (result.success) {
                    showResult('✅ Login successful! Admin access working.', 'success');
                    console.log('✅ Current user:', auth.currentUser);
                } else {
                    showResult('❌ Login failed: ' + result.error, 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showResult('❌ Error during login: ' + error.message, 'error');
            }
        }
        
        function showResult(message, type) {
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = `
                <div class="status ${type}">
                    ${message}
                </div>
                <div style="margin-top: 20px;">
                    <button onclick="goToLogin()" class="test-btn" style="background: #28a745; font-size: 14px;">
                        🚪 Go to Login Page
                    </button>
                    <button onclick="goToAdmin()" class="test-btn" style="background: #ffc107; color: #000; font-size: 14px;">
                        🏠 Go to Admin Dashboard
                    </button>
                </div>
            `;
        }
        
        function goToLogin() {
            window.location.href = 'login.html';
        }
        
        function goToAdmin() {
            window.location.href = 'admin/dashboard.html';
        }
        
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 Page loaded, initializing auth...');
            initAuth();
        });
    </script>
</body>
</html>
