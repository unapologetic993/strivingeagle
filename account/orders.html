<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Striving Eagle</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .account-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .account-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .account-header h1 {
            margin: 0;
        }
        
        .account-nav {
            display: flex;
            gap: 1rem;
        }
        
        .account-nav button {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .account-nav button:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .account-section {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }
        
        .account-section h2 {
            margin-bottom: 1.5rem;
            color: var(--text-color);
        }
        
        .order-item {
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            background: var(--bg-color);
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .order-id {
            font-weight: bold;
            color: var(--primary-color);
            font-size: 1.1rem;
        }
        
        .order-date {
            color: var(--text-color);
            opacity: 0.7;
        }
        
        .order-status {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .status-pending {
            background: #f39c12;
            color: white;
        }
        
        .status-processing {
            background: #3498db;
            color: white;
        }
        
        .status-completed {
            background: #27ae60;
            color: white;
        }
        
        .status-cancelled {
            background: #e74c3c;
            color: white;
        }
        
        .order-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .detail-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .detail-label {
            font-weight: 600;
            color: var(--text-color);
        }
        
        .detail-value {
            color: var(--text-color);
            opacity: 0.8;
        }
        
        .order-items {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 5px;
            margin-top: 1rem;
        }
        
        .order-items h4 {
            margin-bottom: 1rem;
            color: var(--text-color);
        }
        
        .item-list {
            list-style: none;
            padding: 0;
        }
        
        .item-list li {
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-color);
        }
        
        .item-list li:last-child {
            border-bottom: none;
        }
        
        .empty-orders {
            text-align: center;
            padding: 3rem;
            color: var(--text-color);
            opacity: 0.7;
        }
        
        .empty-orders i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--primary-color);
        }
        
        @media (max-width: 768px) {
            .account-header {
                flex-direction: column;
                gap: 1rem;
            }
            
            .order-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h1><i class="fas fa-eagle"></i> Striving Eagle</h1>
            </div>
            <div class="nav-menu" id="nav-menu">
                <a href="../index.html" class="nav-link">Store</a>
                <a href="orders.html" class="nav-link active">My Orders</a>
                <a href="profile.html" class="nav-link">Profile</a>
                <button class="btn-admin btn-danger" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="account-container">
        <!-- Account Header -->
        <div class="account-header">
            <div>
                <h1><i class="fas fa-user"></i> My Account</h1>
                <p>Welcome back, <span id="customer-name">Customer</span></p>
            </div>
            <div class="account-nav">
                <button onclick="showSection('orders')">
                    <i class="fas fa-shopping-cart"></i> Orders
                </button>
                <button onclick="showSection('profile')">
                    <i class="fas fa-user"></i> Profile
                </button>
            </div>
        </div>

        <!-- Orders Section -->
        <div id="orders-section" class="account-section">
            <h2><i class="fas fa-shopping-cart"></i> My Orders</h2>
            <div id="customer-orders-list">
                <!-- Orders will be loaded here -->
            </div>
        </div>

        <!-- Profile Section -->
        <div id="profile-section" class="account-section" style="display: none;">
            <h2><i class="fas fa-user"></i> Profile Information</h2>
            <div id="profile-info">
                <!-- Profile information will be loaded here -->
            </div>
        </div>
    </div>
    
    <script src="../js/auth.js"></script>
    <script src="../js/customer-account.js"></script>
</body>
</html>
