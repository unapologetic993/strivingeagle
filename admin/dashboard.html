<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Striving Eagle</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .admin-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .admin-header h1 {
            margin: 0;
        }
        
        .admin-nav {
            display: flex;
            gap: 1rem;
        }
        
        .admin-nav button {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .admin-nav button:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }
        
        .admin-section {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }
        
        .admin-section h2 {
            margin-bottom: 1.5rem;
            color: var(--text-color);
        }
        
        .product-form {
            display: grid;
            gap: 1rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .form-group label {
            font-weight: 500;
            color: var(--text-color);
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            background: var(--bg-color);
            color: var(--text-color);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .btn-admin {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-admin:hover {
            background: var(--secondary-color);
        }
        
        .btn-danger {
            background: #e74c3c;
        }
        
        .btn-success {
            background: #27ae60;
        }
        
        .products-list {
            max-height: 600px;
            overflow-y: auto;
        }
        
        .product-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            margin-bottom: 1rem;
            background: var(--bg-color);
        }
        
        .product-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 5px;
        }
        
        .product-info {
            flex: 1;
        }
        
        .product-name {
            font-weight: 600;
            color: var(--text-color);
        }
        
        .product-meta {
            font-size: 0.9rem;
            color: var(--text-color);
            opacity: 0.7;
        }
        
        .product-price {
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .orders-section {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }
        
        .notification-wrapper {
            position: relative;
        }
        
        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--secondary-color);
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.7rem;
            font-weight: bold;
            display: none;
        }
        
        .notification-container {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #ddd;
        }
        
        .notification-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .notification-item {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .notification-item:hover {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .notification-item.unread {
            border-left: 4px solid var(--secondary-color);
            background: #f8f9fa;
        }
        
        .notification-item.read {
            opacity: 0.7;
        }
        
        .notification-type {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: var(--secondary-color);
        }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-message {
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }
        
        .notification-details {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.4;
        }
        
        .notification-time {
            font-size: 0.8rem;
            color: #999;
            text-align: right;
            margin-top: 0.5rem;
        }
        
        .order-item {
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 1rem;
            margin-bottom: 1rem;
            background: var(--bg-color);
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }
        
        .order-id {
            font-weight: bold;
            color: var(--primary-color);
        }
        
        .order-status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .status-pending {
            background: #f39c12;
            color: white;
        }
        
        .status-completed {
            background: #27ae60;
            color: white;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--primary-color);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 5px;
            box-shadow: var(--shadow);
            z-index: 3000;
            animation: slideIn 0.3s ease;
        }
        
        .edit-mode {
            background: #fff3cd;
            border: 2px solid #ffc107;
        }
        
        @media (max-width: 768px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .admin-header {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <h1><i class="fas fa-eagle"></i> Striving Eagle Admin</h1>
            </div>
            <div class="nav-menu" id="nav-menu">
                <button class="btn-admin" onclick="viewStore()">
                    <i class="fas fa-store"></i> View Store
                </button>
                <button class="btn-admin btn-danger" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
                <div class="notification-wrapper">
                    <button class="btn-admin" onclick="showSection('notifications')">
                        <i class="fas fa-bell"></i> Notifications
                        <span id="notification-badge" class="notification-badge" style="display: none;">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <!-- Admin Header -->
        <div class="admin-header">
            <div>
                <h1><i class="fas fa-tachometer-alt"></i> Admin Dashboard</h1>
                <p>Welcome back, <span id="admin-name">Admin</span></p>
            </div>
            <div class="admin-nav">
                <button onclick="showSection('products')">
                    <i class="fas fa-box"></i> Products
                </button>
                <button onclick="showSection('orders')">
                    <i class="fas fa-shopping-cart"></i> Orders
                </button>
            </div>
        </div>

        <!-- Products Section -->
        <div id="products-section" class="admin-grid">
            <!-- Add Product Section -->
            <div class="admin-section">
                <h2><i class="fas fa-plus-circle"></i> <span id="product-form-title">Add New Product</span></h2>
                <form id="add-product-form" class="product-form">
                    <input type="hidden" id="edit-product-id" value="">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="product-name">Product Name *</label>
                            <input type="text" id="product-name" required>
                        </div>
                        <div class="form-group">
                            <label for="product-price">Price (MWK) *</label>
                            <input type="number" id="product-price" required min="0">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="product-category">Category *</label>
                            <select id="product-category" required>
                                <option value="">Select Category</option>
                                <option value="glasses">Glasses</option>
                                <option value="earrings">Earrings</option>
                                <option value="socks">Socks</option>
                                <option value="hats">Hats</option>
                                <option value="beanies">Beanies</option>
                                <option value="jeans">Jeans</option>
                                <option value="sweatpants">Sweatpants</option>
                                <option value="jorts">Jorts</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="product-gender">Gender *</label>
                            <select id="product-gender" required>
                                <option value="">Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="unisex">Unisex</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="product-age">Age Group *</label>
                            <select id="product-age" required>
                                <option value="">Select Age Group</option>
                                <option value="kids">Kids</option>
                                <option value="teens">Teens</option>
                                <option value="adults">Adults</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="product-sizes">Sizes (comma-separated)</label>
                            <input type="text" id="product-sizes" placeholder="e.g., s, m, l, xl">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="product-image">Product Image *</label>
                        <input type="file" id="product-image" accept="image/*" required>
                        <div id="image-preview" style="margin-top: 10px;">
                            <img id="preview-img" src="" alt="Preview" style="max-width: 200px; max-height: 200px; display: none; border-radius: 5px; border: 1px solid #ddd;">
                        </div>
                        <small style="color: #666; font-size: 0.9rem;">Upload image file (JPG, PNG, GIF)</small>
                    </div>
                    
                    <div class="form-group">
                        <label for="product-description">Description *</label>
                        <textarea id="product-description" rows="4" required placeholder="Describe your product..."></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="product-is-new">
                                Mark as New Arrival
                            </label>
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="product-in-stock" checked>
                                In Stock
                            </label>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <button type="submit" class="btn-admin" id="submit-btn">
                            <i class="fas fa-plus"></i> Add Product
                        </button>
                        <button type="button" class="btn-admin btn-danger" id="cancel-edit-btn" onclick="cancelEdit()" style="display: none;">
                            <i class="fas fa-times"></i> Cancel Edit
                        </button>
                    </div>
                </form>
            </div>

            <!-- Products List Section -->
            <div class="admin-section">
                <h2><i class="fas fa-list"></i> Current Products</h2>
                <div class="products-list" id="products-list">
                    <!-- Products will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Orders Section -->
        <div id="orders-section" class="orders-section" style="display: none;">
            <h2><i class="fas fa-shopping-cart"></i> Customer Orders</h2>
            <div id="orders-list">
                <!-- Orders will be loaded here -->
            </div>
        </div>

        <!-- Notifications Section -->
        <div id="notifications-section" class="orders-section" style="display: none;">
            <h2><i class="fas fa-bell"></i> Order Notifications</h2>
            <div id="notification-container">
                <!-- Notifications will be loaded here -->
            </div>
        </div>
    </div>
    
    <script src="../js/auth.js"></script>
    <script src="../js/admin-dashboard.js"></script>
</body>
</html>
