<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Admin - Striving Eagle</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .login-header {
            margin-bottom: 30px;
        }
        .login-header h1 {
            color: #667eea;
            margin: 0 0 10px 0;
            font-size: 2rem;
        }
        .login-header p {
            color: #666;
            margin: 0;
        }
        .form-group {
            margin: 20px 0;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .login-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.3s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            display: none;
        }
        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            display: none;
        }
        .notification-badge {
            background: #dc3545;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .request-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .request-card:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }
        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .request-id {
            background: #007bff;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .request-urgent {
            background: #dc3545;
        }
        .request-customer {
            font-weight: bold;
            color: #495057;
        }
        .request-product {
            background: #28a745;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-top: 5px;
        }
        .request-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .request-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: bold;
        }
        .request-approve {
            background: #28a745;
            color: white;
        }
        .request-reject {
            background: #dc3545;
            color: white;
        }
        .request-contact {
            background: #007bff;
            color: white;
        }
        .dashboard-container {
            display: none;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .admin-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 2rem;
            border-radius: 10px;
            margin-bottom: 2rem;
            text-align: center;
        }
        .admin-section {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        .product-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .product-info {
            flex: 1;
            margin-left: 1rem;
        }
        .product-actions {
            display: flex;
            gap: 0.5rem;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-danger {
            background: #dc3545;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        .btn:hover {
            background: #764ba2;
        }
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        .add-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .add-btn:hover {
            background: #218838;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .form-textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            resize: vertical;
        }
        .form-label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        .form-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .form-actions {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <!-- Login Section -->
    <div id="login-section" class="login-container">
        <div class="login-header">
            <h1><i class="fas fa-eagle"></i> Striving Eagle</h1>
            <p>Chrome Admin Login</p>
        </div>
        
        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Login to Admin
            </button>
        </form>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard-section" class="dashboard-container">
        <div class="admin-header">
            <h1><i class="fas fa-tachometer-alt"></i> Chrome Admin Dashboard</h1>
            <p id="admin-welcome">Welcome, Admin</p>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <div class="admin-section">
            <h2><i class="fas fa-box"></i> Products Management</h2>
            
            <button class="add-btn" onclick="showAddProductForm()">
                <i class="fas fa-plus"></i> Add New Product
            </button>
            
            <div id="add-product-form" class="form-section" style="display: none;">
                <h3 id="form-title">Upload Post</h3>
                <form id="product-form" onsubmit="event.preventDefault(); saveProduct();">
                    <div class="form-grid">
                        <div>
                            <label class="form-label">Product Name *</label>
                            <input type="text" id="product-name" class="form-input" required>
                        </div>
                        <div>
                            <label class="form-label">Price (MWK) *</label>
                            <input type="number" id="product-price" class="form-input" required>
                        </div>
                    </div>
                    
                    <div class="form-grid-3">
                        <div>
                            <label class="form-label">Category *</label>
                            <select id="product-category" class="form-input" required>
                                <option value="">Select Category</option>
                                <optgroup label="Tops">
                                    <option value="t-shirts">T-Shirts</option>
                                    <option value="tank-tops">Tank Tops</option>
                                    <option value="crop-tops">Crop Tops</option>
                                    <option value="blouses">Blouses</option>
                                    <option value="polo-shirts">Polo Shirts</option>
                                    <option value="hoodies">Hoodies</option>
                                    <option value="sweaters">Sweaters</option>
                                </optgroup>
                                <optgroup label="Bottoms">
                                    <option value="jeans">Jeans</option>
                                    <option value="shorts">Shorts</option>
                                    <option value="skirts">Skirts</option>
                                    <option value="leggings">Leggings</option>
                                    <option value="cargo-pants">Cargo Pants</option>
                                    <option value="sweatpants">Sweatpants</option>
                                    <option value="underwear">Underwear</option>
                                </optgroup>
                                <optgroup label="Outerwear">
                                    <option value="coats">Coats</option>
                                    <option value="blazers">Blazers</option>
                                    <option value="suits">Suits</option>
                                </optgroup>
                                <optgroup label="Dresses">
                                    <option value="dresses">Dresses</option>
                                </optgroup>
                                <optgroup label="Activewear">
                                    <option value="activewear">Activewear</option>
                                    <option value="sports-bras">Sports Bras</option>
                                </optgroup>
                                <optgroup label="Footwear">
                                    <option value="sneakers">Sneakers</option>
                                    <option value="boots">Boots</option>
                                    <option value="sandals">Sandals</option>
                                    <option value="heels">Heels</option>
                                </optgroup>
                                <optgroup label="Accessories">
                                    <option value="glasses">Glasses</option>
                                    <option value="earrings">Earrings</option>
                                    <option value="socks">Socks</option>
                                    <option value="hats">Hats</option>
                                    <option value="caps">Caps</option>
                                    <option value="beanies">Beanies</option>
                                    <option value="gloves">Gloves</option>
                                    <option value="backpacks">Backpacks</option>
                                    <option value="jewellery">Jewellery</option>
                                </optgroup>
                            </select>
                        </div>
                        <div>
                            <label class="form-label">Gender *</label>
                            <select id="product-gender" class="form-input" required>
                                <option value="">Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="unisex">Unisex</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label">Age Group *</label>
                            <select id="product-age" class="form-input" required>
                                <option value="">Select Age Group</option>
                                <option value="all-ages">All Ages</option>
                                <option value="kids">Kids</option>
                                <option value="teens">Teens</option>
                                <option value="adults">Adults</option>
                            </select>
                        </div>
                    </div>
                    
                    <div style="margin-bottom: 15px;">
                        <label class="form-label">Sizes (comma-separated)</label>
                        <input type="text" id="product-sizes" class="form-input" placeholder="e.g., s, m, l, xl">
                    </div>
                    
                    <div style="margin-bottom: 15px;">
                        <label class="form-label">Product Image *</label>
                        <input type="file" id="product-image" class="form-input" accept="image/*" onchange="previewImage(event)">
                        <div id="image-preview" style="margin-top: 10px; display: none;">
                            <img id="preview-img" src="" alt="Preview" style="max-width: 200px; max-height: 200px; border-radius: 5px; border: 1px solid #ddd;">
                            <br>
                            <small style="color: #666;">Image preview will be shown here</small>
                        </div>
                        <small style="color: #666; font-size: 0.85rem;">Upload image file (JPG, PNG, GIF)</small>
                    </div>
                    
                    <div style="margin-bottom: 15px;">
                        <label class="form-label">Description *</label>
                        <textarea id="product-description" class="form-textarea" rows="3" required></textarea>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" id="submit-btn" class="btn" style="background: #28a745;">
                            <i class="fas fa-upload"></i> Upload Post
                        </button>
                        <button type="button" class="btn" onclick="cancelAddProduct()" style="background: #dc3545;">
                            <i class="fas fa-times"></i> Cancel
                        </button>
                    </div>
                </form>
            </div>
            
            <div id="products-list">
                <!-- Products will be loaded here -->
            </div>
        </div>

        <div class="admin-section">
            <h2><i class="fas fa-shopping-cart"></i> Customer Orders</h2>
            <div id="orders-list">
                <!-- Orders will be loaded here -->
            </div>
        </div>

        <div class="admin-section">
            <h2><i class="fas fa-envelope"></i> Customer Requests <span id="notification-badge" class="notification-badge" style="display: none;">0</span></h2>
            <div id="requests-list">
                <!-- Customer requests will be loaded here -->
            </div>
        </div>
    </div>

    <script>
        // Chrome Admin System - Completely Independent
        let products = [];
        let orders = [];
        let currentUser = null;

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Check if already logged in
            const session = localStorage.getItem('chromeAdminSession');
            if (session) {
                currentUser = JSON.parse(session);
                showDashboard();
            } else {
                showLogin();
            }
            
            // Setup forms
            const loginForm = document.getElementById('login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', handleLogin);
            }
            
            const productForm = document.getElementById('product-form');
            if (productForm) {
                productForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    saveProduct();
                });
            }
        });

        function showLogin() {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('dashboard-section').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'block';
            
            // Update welcome message
            const welcomeDiv = document.getElementById('admin-welcome');
            if (welcomeDiv && currentUser) {
                welcomeDiv.textContent = 'Welcome, ' + currentUser.name;
            }
            
            // Load data
            loadProducts();
            loadOrders();
            displayCustomerRequests(); // Load customer requests
        }

        function handleLogin(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // Chrome Admin authentication - matches main auth system
            if (username === 'Charles' && password === 'ChisomoXCharles08') {
                // Create session
                currentUser = {
                    username: 'Charles',
                    name: 'Admin User',
                    role: 'admin',
                    loginTime: new Date().toISOString()
                };
                
                // Save session
                localStorage.setItem('chromeAdminSession', JSON.stringify(currentUser));
                
                // Show success
                showMessage('success-message', 'Login successful! Welcome to Chrome Admin');
                
                // Show dashboard
                setTimeout(() => {
                    showDashboard();
                }, 1000);
                
            } else {
                showMessage('error-message', 'INCORRECT');
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('chromeAdminSession');
                currentUser = null;
                showLogin();
                showMessage('success-message', 'Logged out successfully');
            }
        }

        function showMessage(messageId, message) {
            const messageDiv = document.getElementById(messageId);
            if (messageDiv) {
                messageDiv.textContent = message;
                messageDiv.style.display = 'block';
                
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }

        function showAddProductForm() {
            document.getElementById('add-product-form').style.display = 'block';
            // Don't hide products list when adding new product
        }

        function cancelAddProduct() {
            document.getElementById('add-product-form').style.display = 'none';
            document.getElementById('product-form').reset();
            document.getElementById('form-title').textContent = 'Upload Post';
            document.getElementById('submit-btn').textContent = 'Upload Post';
            document.getElementById('submit-btn').removeAttribute('data-editing');
            
            // Clear image preview
            const previewDiv = document.getElementById('image-preview');
            const previewImg = document.getElementById('preview-img');
            if (previewDiv && previewImg) {
                previewDiv.style.display = 'none';
                previewImg.src = '';
            }
        }

        function syncToMainWebsite(product) {
            // Get existing main website products
            let mainProducts = JSON.parse(localStorage.getItem('adminProducts') || '[]');
            
            // PERMANENT DUPLICATE PREVENTION
            // Check if product already exists to avoid duplicates
            const existingIndex = mainProducts.findIndex(p => p.id === product.id);
            if (existingIndex === -1) {
                // Add new product
                mainProducts.push(product);
            } else {
                // Update existing product
                mainProducts[existingIndex] = product;
            }
            
            // Save to main website storage ONLY
            localStorage.setItem('adminProducts', JSON.stringify(mainProducts));
            
            // Clear gender-specific storage to prevent duplicates
            localStorage.removeItem('maleProducts');
            localStorage.removeItem('femaleProducts');
            
            // Update category-specific storage for latest/featured only
            updateCategoryProducts(product);
            
            // Set permanent fix flag
            localStorage.setItem('duplicatePreventionEnabled', 'true');
            localStorage.setItem('lastSyncTime', new Date().toISOString());
        }

        function updateCategoryProducts(product) {
            // NO LONGER storing in gender-specific storage
            // All products come from adminProducts (single source of truth)
            
            // NO LONGER adding to latest posts - products go directly to male/female sections
            
            // Update featured products only
            let featuredProducts = JSON.parse(localStorage.getItem('featuredProducts') || '[]');
            if (product.isNew) {
                // Check if already in featured to avoid duplicates
                const existingIndex = featuredProducts.findIndex(p => p.id === product.id);
                if (existingIndex === -1) {
                    featuredProducts.push(product);
                    if (featuredProducts.length > 6) {
                        featuredProducts = featuredProducts.slice(0, 6); // Keep only 6 featured
                    }
                }
            }
            localStorage.setItem('featuredProducts', JSON.stringify(featuredProducts));
        }

        function updateLatestProducts(newProduct) {
            // Get existing latest products
            let latestProducts = JSON.parse(localStorage.getItem('latestProducts') || '[]');
            
            // Add the new product to the beginning
            newProduct.addedToLatest = new Date().toISOString();
            latestProducts.unshift(newProduct);
            
            // Filter products to show only those within 15 days
            const fifteenDaysAgo = new Date();
            fifteenDaysAgo.setDate(fifteenDaysAgo.getDate() - 15);
            
            latestProducts = latestProducts.filter(product => {
                const addedDate = new Date(product.addedToLatest || product.createdAt);
                return addedDate > fifteenDaysAgo;
            });
            
            // Keep only the 20 most recent products
            if (latestProducts.length > 20) {
                latestProducts = latestProducts.slice(0, 20);
            }
            
            // Save updated latest products
            localStorage.setItem('latestProducts', JSON.stringify(latestProducts));
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const previewDiv = document.getElementById('image-preview');
                    const previewImg = document.getElementById('preview-img');
                    
                    previewDiv.style.display = 'block';
                    previewImg.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function loadProducts() {
            try {
                const savedProducts = localStorage.getItem('chromeAdminProducts');
                if (savedProducts) {
                    products = JSON.parse(savedProducts);
                } else {
                    // Start with empty products - no sample products
                    products = [];
                }
                displayProducts();
            } catch (error) {
                console.error('Error loading products:', error);
                products = [];
                displayProducts();
            }
        }

        function displayProducts() {
            const productsList = document.getElementById('products-list');
            if (!productsList) return;
            
            if (products.length === 0) {
                productsList.innerHTML = '<p>No products found.</p>';
                return;
            }
            
            productsList.innerHTML = products.map(product => `
                <div class="product-item">
                    <div style="width: 80px; height: 80px; margin-right: 1rem;">
                        <img src="${product.image}" alt="${product.name}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 8px;" onerror="this.src='https://via.placeholder.com/80x80?text=No+Image'">
                    </div>
                    <div class="product-info">
                        <strong>${product.name}</strong><br>
                        <small>${product.category} | ${product.gender} | ${product.ageGroup} | MWK ${product.price.toLocaleString()}</small><br>
                        <small>Sizes: ${product.sizes ? product.sizes.join(', ') : 'One size'}</small><br>
                        <small>${product.description}</small>
                        ${product.isNew ? '<br><span style="color: #28a745; font-weight: bold;">NEW</span>' : ''}
                    </div>
                    <div class="product-actions">
                        <button class="btn" onclick="editProduct('${product.id}')">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="btn btn-danger" onclick="deleteProduct('${product.id}')">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function deleteProduct(productId) {
            if (confirm('Are you sure you want to delete this product?')) {
                // Delete from Chrome admin
                products = products.filter(p => p.id !== productId);
                localStorage.setItem('chromeAdminProducts', JSON.stringify(products));
                
                // SYNC DELETION TO MAIN WEBSITE
                
                // Delete from main admin storage
                let adminProducts = JSON.parse(localStorage.getItem('adminProducts') || '[]');
                adminProducts = adminProducts.filter(p => p.id !== productId);
                localStorage.setItem('adminProducts', JSON.stringify(adminProducts));
                
                // NO LONGER deleting from latest posts - not used anymore
                
                // Delete from featured products
                let featuredProducts = JSON.parse(localStorage.getItem('featuredProducts') || '[]');
                featuredProducts = featuredProducts.filter(p => p.id !== productId);
                localStorage.setItem('featuredProducts', JSON.stringify(featuredProducts));
                
                // Clear gender storage (should already be empty)
                localStorage.removeItem('maleProducts');
                localStorage.removeItem('femaleProducts');
                
                // Set deletion sync flag
                localStorage.setItem('lastDeletionSync', new Date().toISOString());
                localStorage.setItem('deletedProductId', productId);
                
                displayProducts();
                showMessage('success-message', 'Product deleted successfully from all locations');
            }
        }

        function editProduct(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            // Populate form with product data
            document.getElementById('product-name').value = product.name;
            document.getElementById('product-price').value = product.price;
            document.getElementById('product-category').value = product.category;
            document.getElementById('product-gender').value = product.gender;
            document.getElementById('product-age').value = product.ageGroup;
            document.getElementById('product-sizes').value = product.sizes.join(', ');
            document.getElementById('product-description').value = product.description;
            
            // Show form
            document.getElementById('add-product-form').style.display = 'block';
            document.getElementById('form-title').textContent = 'Edit Post';
            document.getElementById('submit-btn').textContent = 'Update Post';
            
            // Store editing product ID
            document.getElementById('submit-btn').setAttribute('data-editing', productId);
            
            // Scroll to form
            document.getElementById('add-product-form').scrollIntoView({ behavior: 'smooth' });
        }

        function updateProduct(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            const name = document.getElementById('product-name').value;
            const price = parseFloat(document.getElementById('product-price').value);
            const category = document.getElementById('product-category').value;
            const gender = document.getElementById('product-gender').value;
            const ageGroup = document.getElementById('product-age').value;
            const sizes = document.getElementById('product-sizes').value.split(',').map(s => s.trim()).filter(s => s);
            const description = document.getElementById('product-description').value;
            const imageFile = document.getElementById('product-image').files[0];

            if (!name || !price || !category || !gender || !ageGroup || !description) {
                showMessage('error-message', 'Please fill in all required fields');
                return;
            }

            // Handle image upload
            if (imageFile) {
                // Read image as base64
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Update product with new image
                    product.name = name;
                    product.price = price;
                    product.category = category;
                    product.gender = gender;
                    product.ageGroup = ageGroup;
                    product.sizes = sizes.length > 0 ? sizes : ['one-size'];
                    product.description = description;
                    product.image = e.target.result;
                    product.updatedAt = new Date().toISOString();
                    
                    // Save to Chrome admin
                    localStorage.setItem('chromeAdminProducts', JSON.stringify(products));
                    
                    // Sync to main website
                    syncUpdatedProduct(product);
                    
                    showMessage('success-message', 'Product updated successfully!');
                    cancelAddProduct();
                    displayProducts();
                };
                reader.readAsDataURL(imageFile);
            } else {
                // Update product without changing image
                product.name = name;
                product.price = price;
                product.category = category;
                product.gender = gender;
                product.ageGroup = ageGroup;
                product.sizes = sizes.length > 0 ? sizes : ['one-size'];
                product.description = description;
                product.updatedAt = new Date().toISOString();
                
                // Save to Chrome admin
                localStorage.setItem('chromeAdminProducts', JSON.stringify(products));
                
                // Sync to main website
                syncUpdatedProduct(product);
                
                showMessage('success-message', 'Product updated successfully!');
                cancelAddProduct();
                displayProducts();
            }
        }

        function syncUpdatedProduct(updatedProduct) {
            // Update main website products
            let mainProducts = JSON.parse(localStorage.getItem('adminProducts') || '[]');
            const existingIndex = mainProducts.findIndex(p => p.id === updatedProduct.id);
            
            if (existingIndex !== -1) {
                mainProducts[existingIndex] = updatedProduct;
                localStorage.setItem('adminProducts', JSON.stringify(mainProducts));
            }
            
            // Update category-specific storage
            updateCategoryProduct(updatedProduct);
        }

        function updateCategoryProduct(updatedProduct) {
            // Update gender-specific storage
            if (updatedProduct.gender === 'male') {
                let maleProducts = JSON.parse(localStorage.getItem('maleProducts') || '[]');
                const maleIndex = maleProducts.findIndex(p => p.id === updatedProduct.id);
                if (maleIndex !== -1) {
                    maleProducts[maleIndex] = updatedProduct;
                    localStorage.setItem('maleProducts', JSON.stringify(maleProducts));
                }
            } else if (updatedProduct.gender === 'female') {
                let femaleProducts = JSON.parse(localStorage.getItem('femaleProducts') || '[]');
                const femaleIndex = femaleProducts.findIndex(p => p.id === updatedProduct.id);
                if (femaleIndex !== -1) {
                    femaleProducts[femaleIndex] = updatedProduct;
                    localStorage.setItem('femaleProducts', JSON.stringify(femaleProducts));
                }
            } else if (updatedProduct.gender === 'unisex') {
                // Unisex products are ONLY in admin storage
                // Display functions will handle showing them in both sections
            }
            
            // Update latest products
            let latestProducts = JSON.parse(localStorage.getItem('latestProducts') || '[]');
            const latestIndex = latestProducts.findIndex(p => p.id === updatedProduct.id);
            if (latestIndex !== -1) {
                latestProducts[latestIndex] = updatedProduct;
                localStorage.setItem('latestProducts', JSON.stringify(latestProducts));
            }
            
            // Update featured products
            let featuredProducts = JSON.parse(localStorage.getItem('featuredProducts') || '[]');
            const featuredIndex = featuredProducts.findIndex(p => p.id === updatedProduct.id);
            if (featuredIndex !== -1) {
                featuredProducts[featuredIndex] = updatedProduct;
                localStorage.setItem('featuredProducts', JSON.stringify(featuredProducts));
            }
        }

        function saveProduct() {
            const submitBtn = document.getElementById('submit-btn');
            const editingId = submitBtn.getAttribute('data-editing');
            
            if (editingId) {
                // Update existing product
                updateProduct(editingId);
            } else {
                // Add new product
                addNewProduct();
            }
        }

        function addNewProduct() {
            const name = document.getElementById('product-name').value;
            const price = parseFloat(document.getElementById('product-price').value);
            const category = document.getElementById('product-category').value;
            const gender = document.getElementById('product-gender').value;
            const ageGroup = document.getElementById('product-age').value;
            const sizes = document.getElementById('product-sizes').value.split(',').map(s => s.trim()).filter(s => s);
            const description = document.getElementById('product-description').value;
            const imageFile = document.getElementById('product-image').files[0];

            if (!name || !price || !category || !gender || !ageGroup || !description) {
                showMessage('error-message', 'Please fill in all required fields');
                return;
            }

            // Handle image upload
            let imageUrl = 'https://via.placeholder.com/300x300?text=No+Image';
            if (imageFile) {
                // Read image as base64
                const reader = new FileReader();
                reader.onload = function(e) {
                    imageUrl = e.target.result;
                    
                    // Create product with image
                    const newProduct = {
                        id: 'prod_' + Date.now(),
                        name: name,
                        price: price,
                        category: category,
                        gender: gender,
                        ageGroup: ageGroup,
                        sizes: sizes.length > 0 ? sizes : ['one-size'],
                        description: description,
                        image: imageUrl,
                        isNew: true,
                        createdAt: new Date().toISOString()
                    };

                    // PERMANENT DUPLICATE PREVENTION
                    // Check if product already exists in Chrome admin
                    const existingIndex = products.findIndex(p => p.name === name && p.price === price);
                    if (existingIndex === -1) {
                        // Save to Chrome admin
                        products.push(newProduct);
                        localStorage.setItem('chromeAdminProducts', JSON.stringify(products));
                        
                        // Sync to main website (includes duplicate prevention)
                        syncToMainWebsite(newProduct);
                        
                        showMessage('success-message', 'Product added successfully!');
                        cancelAddProduct();
                        displayProducts();
                    } else {
                        showMessage('error-message', 'Product already exists! Please edit the existing product instead.');
                    }
                };
                reader.readAsDataURL(imageFile);
            } else {
                // Create product without image
                const newProduct = {
                    id: 'prod_' + Date.now(),
                    name: name,
                    price: price,
                    category: category,
                    gender: gender,
                    ageGroup: ageGroup,
                    sizes: sizes.length > 0 ? sizes : ['one-size'],
                    description: description,
                    image: imageUrl,
                    isNew: true,
                    createdAt: new Date().toISOString()
                };

                // PERMANENT DUPLICATE PREVENTION
                // Check if product already exists in Chrome admin
                const existingIndex = products.findIndex(p => p.name === name && p.price === price);
                if (existingIndex === -1) {
                    // Save to Chrome admin
                    products.push(newProduct);
                    localStorage.setItem('chromeAdminProducts', JSON.stringify(products));
                    
                    // Sync to main website (includes duplicate prevention)
                    syncToMainWebsite(newProduct);
                    
                    showMessage('success-message', 'Product added successfully!');
                    cancelAddProduct();
                    displayProducts();
                } else {
                    showMessage('error-message', 'Product already exists! Please edit the existing product instead.');
                }
            }
        }

        function loadOrders() {
            try {
                const savedOrders = localStorage.getItem('chromeAdminOrders');
                if (savedOrders) {
                    orders = JSON.parse(savedOrders);
                } else {
                    orders = [];
                }
                
                displayOrders();
            } catch (error) {
                console.error('Error loading orders:', error);
                orders = [];
            }
        }

        function displayOrders() {
            const ordersList = document.getElementById('orders-list');
            if (!ordersList) return;
            
            if (orders.length === 0) {
                ordersList.innerHTML = '<p>No customer orders found.</p>';
                return;
            }
            
            ordersList.innerHTML = orders.map(order => `
                <div class="product-item">
                    <div class="product-info">
                        <strong>Order #${order.orderId || 'N/A'}</strong><br>
                        <small>${order.name || 'Customer'} | MWK ${order.total?.toLocaleString() || '0'}</small><br>
                        <small>${new Date(order.timestamp || Date.now()).toLocaleDateString()}</small>
                    </div>
                    <div class="product-actions">
                        <button class="btn" onclick="viewOrder('${order.id}')">
                            <i class="fas fa-eye"></i> View
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function viewOrder(orderId) {
            showMessage('success-message', 'Order details coming soon!');
        }

        // Customer Requests Functions
        function displayCustomerRequests() {
            const requestsList = document.getElementById('requests-list');
            if (!requestsList) return;
            
            // Get customer requests from localStorage
            const requests = JSON.parse(localStorage.getItem('customerRequests') || '[]');
            const notifications = JSON.parse(localStorage.getItem('adminNotifications') || '[]');
            
            // Update notification badge
            const unreadCount = notifications.filter(n => n.status === 'unread').length;
            const badge = document.getElementById('notification-badge');
            if (badge) {
                if (unreadCount > 0) {
                    badge.textContent = unreadCount;
                    badge.style.display = 'inline-block';
                } else {
                    badge.style.display = 'none';
                }
            }
            
            if (requests.length === 0) {
                requestsList.innerHTML = '<p>No customer requests found.</p>';
                return;
            }
            
            requestsList.innerHTML = requests.map(request => `
                <div class="request-card">
                    <div class="request-header">
                        <div>
                            <span class="request-id ${request.requestUrgency === 'urgent' || request.requestUrgency === 'very-urgent' ? 'request-urgent' : ''}">
                                ${request.requestId}
                            </span>
                            <span class="request-customer">${request.customerName}</span>
                        </div>
                        <div>
                            <small>${new Date(request.createdAt).toLocaleString()}</small>
                        </div>
                    </div>
                    
                    <div class="request-product">
                        ${request.productName}
                    </div>
                    
                    <div>
                        <strong>Category:</strong> ${request.productCategory} | 
                        <strong>Gender:</strong> ${request.productGender} | 
                        <strong>Age:</strong> ${request.productAge}
                    </div>
                    
                    <div>
                        <strong>Email:</strong> ${request.customerEmail}<br>
                        ${request.customerPhone ? `<strong>Phone:</strong> ${request.customerPhone}<br>` : ''}
                        <strong>Budget:</strong> ${request.productBudget || 'Not specified'}<br>
                        <strong>Size:</strong> ${request.productSize || 'Not specified'}
                    </div>
                    
                    <div>
                        <strong>Description:</strong><br>
                        ${request.productDescription}
                    </div>
                    
                    <div class="request-actions">
                        <button class="request-btn request-contact" onclick="contactCustomer('${request.id}')">
                            <i class="fas fa-envelope"></i> Contact
                        </button>
                        <button class="request-btn request-approve" onclick="updateRequestStatus('${request.id}', 'approved')">
                            <i class="fas fa-check"></i> Approve
                        </button>
                        <button class="request-btn request-reject" onclick="updateRequestStatus('${request.id}', 'rejected')">
                            <i class="fas fa-times"></i> Reject
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        function contactCustomer(requestId) {
            const requests = JSON.parse(localStorage.getItem('customerRequests') || '[]');
            const request = requests.find(r => r.id === requestId);
            
            if (!request) {
                showMessage('error-message', 'Request not found!');
                return;
            }
            
            const emailSubject = `Regarding Your Product Request: ${request.requestId}`;
            const emailBody = `Dear ${request.customerName},\n\nThank you for your interest in ${request.productName}.\n\nWe have received your request and will get back to you shortly.\n\nBest regards,\nStriving Eagle Team`;
            
            // Create mailto link
            const mailtoLink = `mailto:${request.customerEmail}?subject=${encodeURIComponent(emailSubject)}&body=${encodeURIComponent(emailBody)}`;
            window.open(mailtoLink, '_blank');
            
            // Mark notification as read
            markNotificationAsRead(requestId);
            
            showMessage('success-message', 'Opening email client to contact customer...');
        }
        
        function updateRequestStatus(requestId, status) {
            if (!confirm(`Are you sure you want to ${status} this request?`)) return;
            
            // Update request status
            let requests = JSON.parse(localStorage.getItem('customerRequests') || '[]');
            const requestIndex = requests.findIndex(r => r.id === requestId);
            
            if (requestIndex !== -1) {
                requests[requestIndex].status = status;
                requests[requestIndex].updatedAt = new Date().toISOString();
                localStorage.setItem('customerRequests', JSON.stringify(requests));
            }
            
            // Update notification
            let notifications = JSON.parse(localStorage.getItem('adminNotifications') || '[]');
            const notifIndex = notifications.findIndex(n => n.requestId === requestId);
            
            if (notifIndex !== -1) {
                notifications[notifIndex].status = 'read';
                notifications[notifIndex].requestStatus = status;
                localStorage.setItem('adminNotifications', JSON.stringify(notifications));
            }
            
            // Refresh display
            displayCustomerRequests();
            
            showMessage('success-message', `Request ${status} successfully!`);
        }
        
        function markNotificationAsRead(requestId) {
            let notifications = JSON.parse(localStorage.getItem('adminNotifications') || '[]');
            const notifIndex = notifications.findIndex(n => n.requestId === requestId);
            
            if (notifIndex !== -1) {
                notifications[notifIndex].status = 'read';
                localStorage.setItem('adminNotifications', JSON.stringify(notifications));
                displayCustomerRequests(); // Refresh badge
            }
        }
        
        function addRatingNotification(rating, productName, customerId) {
            const notifications = JSON.parse(localStorage.getItem('adminNotifications') || '[]');
            
            const notification = {
                id: 'rating_' + Date.now(),
                type: 'rating',
                requestId: 'rating_' + Date.now(),
                message: `Customer rated "${productName}" ${rating}/5 stars`,
                customerId: customerId,
                productName: productName,
                rating: rating,
                status: 'unread',
                createdAt: new Date().toISOString()
            };
            
            notifications.unshift(notification);
            localStorage.setItem('adminNotifications', JSON.stringify(notifications));
            updateNotificationBadge();
            
            // Show notification
            showMessage('success-message', `New rating received: ${productName} - ${rating}/5 stars`);
        }
    </script>
</body>
