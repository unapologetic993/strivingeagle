<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix Main Admin Login - Striving Eagle</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        .fix-btn {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 10px;
            cursor: pointer;
            margin: 15px;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .fix-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(220, 53, 69, 0.3);
        }
        .success-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }
        .success-btn:hover {
            box-shadow: 0 10px 20px rgba(40, 167, 69, 0.3);
        }
        h1 { 
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        .status {
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        .info { background: #d1ecf1; color: #0c5460; }
        .debug {
            background: #e9ecef;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 14px;
            text-align: left;
            white-space: pre-wrap;
        }
        .step {
            background: #e8f5e8;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 5px solid #28a745;
            text-align: left;
        }
        .step-number {
            background: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 50%;
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Fix Main Admin Login</h1>
        
        <div id="status" class="status info">
            Analyzing main admin login issue...
        </div>
        
        <div class="step">
            <span class="step-number">1</span>
            <strong>Clear Old Data:</strong> Remove conflicting users and sessions
        </div>
        
        <button onclick="clearOldData()" class="fix-btn">
            🗑️ Clear Old Data
        </button>
        
        <div class="step">
            <span class="step-number">2</span>
            <strong>Create Charles Admin:</strong> Create proper admin user in auth system
        </div>
        
        <button onclick="createCharlesAdmin()" class="fix-btn success-btn">
            👤 Create Charles Admin
        </button>
        
        <div class="step">
            <span class="step-number">3</span>
            <strong>Test Main Login:</strong> Verify Charles login works
        </div>
        
        <button onclick="testMainLogin()" class="fix-btn success-btn">
            🔐 Test Main Login
        </button>
        
        <div class="step">
            <span class="step-number">4</span>
            <strong>Go to Main Login:</strong> Try the actual login page
        </div>
        
        <button onclick="goToMainLogin()" class="fix-btn">
            🚪 Go to Main Login
        </button>
        
        <div id="debug" class="debug">
            Loading debug info...
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        let auth;
        
        function initAuth() {
            try {
                if (typeof AuthSystem !== 'undefined') {
                    auth = new AuthSystem();
                    console.log('✅ AuthSystem initialized');
                    return true;
                } else {
                    console.error('❌ AuthSystem not found');
                    return false;
                }
            } catch (error) {
                console.error('❌ Error initializing auth:', error);
                return false;
            }
        }
        
        function clearOldData() {
            console.log('🗑️ Clearing old data...');
            
            // Clear all localStorage data
            localStorage.clear();
            
            showStatus('✅ Old data cleared successfully', 'success');
            updateDebug();
        }
        
        async function createCharlesAdmin() {
            console.log('👤 Creating Charles admin user...');
            
            if (!initAuth()) {
                showStatus('❌ Failed to initialize auth system', 'error');
                return;
            }
            
            try {
                // Initialize admin user (this will create Charles if not exists)
                await auth.initializeAdmin();
                
                showStatus('✅ Charles admin user created successfully!', 'success');
                updateDebug();
                
            } catch (error) {
                console.error('❌ Error creating admin:', error);
                showStatus('❌ Error: ' + error.message, 'error');
            }
        }
        
        async function testMainLogin() {
            console.log('🔐 Testing main login...');
            
            if (!initAuth()) {
                showStatus('❌ Failed to initialize auth system', 'error');
                return;
            }
            
            try {
                const result = await auth.login('Charles', 'ChisomoXCharles08');
                
                console.log('🔐 Login result:', result);
                
                if (result.success) {
                    showStatus('✅ Main login successful! Charles user found and authenticated.', 'success');
                    console.log('✅ Current user:', auth.currentUser);
                } else {
                    showStatus('❌ Main login failed: ' + result.error, 'error');
                }
                
                updateDebug();
                
            } catch (error) {
                console.error('❌ Error testing login:', error);
                showStatus('❌ Error: ' + error.message, 'error');
            }
        }
        
        function goToMainLogin() {
            window.location.href = 'login.html';
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = message;
        }
        
        function updateDebug() {
            const debugDiv = document.getElementById('debug');
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const session = localStorage.getItem('userSession');
            
            let debugInfo = '🔍 DEBUG INFO:\n\n';
            debugInfo += `Users in localStorage: ${users.length}\n`;
            
            if (users.length > 0) {
                users.forEach((user, index) => {
                    debugInfo += `\nUser ${index + 1}:\n`;
                    debugInfo += `  ID: ${user.id}\n`;
                    debugInfo += `  Name: ${user.name}\n`;
                    debugInfo += `  Email/Username: ${user.email}\n`;
                    debugInfo += `  Role: ${user.role}\n`;
                    debugInfo += `  Password type: ${typeof user.password}\n`;
                    debugInfo += `  Password length: ${user.password.length}\n`;
                    debugInfo += `  Is hashed: ${user.password.length > 20 ? 'Yes' : 'No'}\n`;
                });
            }
            
            debugInfo += `\nSession exists: ${session ? 'Yes' : 'No'}\n`;
            
            if (session) {
                const sessionData = JSON.parse(session);
                debugInfo += `Session user: ${sessionData.user?.email || 'None'}\n`;
                debugInfo += `Session role: ${sessionData.user?.role || 'None'}\n`;
            }
            
            debugDiv.textContent = debugInfo;
        }
        
        // Auto-check on page load
        document.addEventListener('DOMContentLoaded', function() {
            updateDebug();
        });
    </script>
</body>
</html>
