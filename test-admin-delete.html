<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Admin Delete - Striving Eagle</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 800px;
            width: 100%;
        }
        .test-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            font-size: 16px;
            font-weight: bold;
        }
        .test-btn:hover {
            background: #0056b3;
            transform: scale(1.05);
        }
        .success-btn { background: #28a745; }
        .success-btn:hover { background: #218838; }
        .danger-btn { background: #dc3545; }
        .danger-btn:hover { background: #c82333; }
        h1 { color: #007bff; margin-bottom: 30px; }
        .status {
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .warning { background: #fff3cd; color: #856404; }
        .info { background: #d1ecf1; color: #0c5460; }
        .products-preview {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
        }
        .product-item {
            background: white;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .product-info {
            flex: 1;
        }
        .product-actions {
            display: flex;
            gap: 5px;
        }
        .mini-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        .mini-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗑️ Test Admin Delete Functionality</h1>
        
        <div id="status" class="status info">
            Checking admin delete functionality...
        </div>
        
        <button onclick="createTestProducts()" class="test-btn success-btn">
            📦 Create Test Products
        </button>
        
        <button onclick="loadProducts()" class="test-btn">
            📋 Load Products
        </button>
        
        <button onclick="goToAdmin()" class="test-btn">
            🏠 Go to Admin Dashboard
        </button>
        
        <button onclick="clearAllProducts()" class="test-btn danger-btn">
            🗑️ Clear All Products
        </button>
        
        <div id="products-preview" class="products-preview">
            <h3>📦 Current Products:</h3>
            <div id="products-list">
                Loading products...
            </div>
        </div>
        
        <div id="result" style="margin-top: 20px;"></div>
    </div>

    <script>
        function createTestProducts() {
            console.log('📦 Creating test products...');
            
            const testProducts = [
                {
                    id: 'test_001',
                    name: 'Test T-Shirt',
                    price: 15000,
                    category: 'hats',
                    gender: 'male',
                    ageGroup: 'adults',
                    image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?ixlib=rb-4.0.3&auto=format&fit=crop&w=1470&q=80',
                    description: 'Test t-shirt for deletion',
                    sizes: ['s', 'm', 'l', 'xl'],
                    isNew: true,
                    createdAt: new Date().toISOString()
                },
                {
                    id: 'test_002',
                    name: 'Test Jeans',
                    price: 25000,
                    category: 'jeans',
                    gender: 'female',
                    ageGroup: 'adults',
                    image: 'https://images.unsplash.com/photo-1542272604-787c3835535d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1470&q=80',
                    description: 'Test jeans for deletion',
                    sizes: ['s', 'm', 'l'],
                    isNew: false,
                    createdAt: new Date().toISOString()
                },
                {
                    id: 'test_003',
                    name: 'Test Hat',
                    price: 8000,
                    category: 'hats',
                    gender: 'unisex',
                    ageGroup: 'teens',
                    image: 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?ixlib=rb-4.0.3&auto=format&fit=crop&w=1470&q=80',
                    description: 'Test hat for deletion',
                    sizes: ['one-size'],
                    isNew: true,
                    createdAt: new Date().toISOString()
                }
            ];
            
            localStorage.setItem('adminProducts', JSON.stringify(testProducts));
            
            showStatus('✅ Created 3 test products for deletion testing', 'success');
            loadProducts();
        }
        
        function loadProducts() {
            const products = JSON.parse(localStorage.getItem('adminProducts') || '[]');
            const productsList = document.getElementById('products-list');
            
            if (products.length === 0) {
                productsList.innerHTML = '<p style="color: #666;">No products found. Create test products first.</p>';
                showStatus('ℹ️ No products found', 'info');
            } else {
                productsList.innerHTML = products.map(product => `
                    <div class="product-item">
                        <div class="product-info">
                            <strong>${product.name}</strong><br>
                            <small>${product.category} | ${product.gender} | MWK ${product.price.toLocaleString()}</small>
                        </div>
                        <div class="product-actions">
                            <button class="mini-btn" onclick="deleteTestProduct('${product.id}')">
                                🗑️ Delete
                            </button>
                        </div>
                    </div>
                `).join('');
                
                showStatus(`✅ Loaded ${products.length} products`, 'success');
            }
        }
        
        function deleteTestProduct(productId) {
            if (confirm('Are you sure you want to delete this test product?')) {
                const products = JSON.parse(localStorage.getItem('adminProducts') || '[]');
                const updatedProducts = products.filter(p => p.id !== productId);
                localStorage.setItem('adminProducts', JSON.stringify(updatedProducts));
                
                showStatus('✅ Product deleted successfully!', 'success');
                loadProducts();
            }
        }
        
        function clearAllProducts() {
            if (confirm('Are you sure you want to delete ALL products?')) {
                localStorage.removeItem('adminProducts');
                showStatus('🗑️ All products cleared!', 'warning');
                loadProducts();
            }
        }
        
        function goToAdmin() {
            window.location.href = 'admin/dashboard.html';
        }
        
        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = message;
        }
        
        // Auto-load products on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadProducts();
        });
    </script>
</body>
</html>
